<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Star Runner - Speed Mode</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: #1E2136;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: Arial, sans-serif;
}

/* Canvas */
canvas {
    border-radius: 16px;
    border: 3px solid #8C7DA8;
    box-shadow: 0 0 25px rgba(140,125,168,0.6);
}

/* UI LEFT (score) */
#scoreUI {
    position: absolute;
    top: 15px;
    left: 20px;
    color: #FFF689;
    font-size: 22px;
    text-shadow: 0 0 10px #F67B45;
}

/* UI RIGHT (timer) */
#timerUI {
    position: absolute;
    top: 15px;
    right: 20px;
    color: #FBC2C2;
    font-size: 22px;
    text-shadow: 0 0 10px #8C7DA8;
}

/* Game over */
#gameOver {
    position: absolute;
    display: none;
    text-align: center;
    padding: 25px;
    border-radius: 12px;
    background: rgba(30,33,54,0.95);
    border: 2px solid #F4D35E;
    color: #FFF689;
}

button {
    margin-top: 10px;
    padding: 10px 18px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    background: #F67B45;
    color: white;
    font-weight: bold;
}
button:hover { background: #FF9C5B; }
</style>
</head>

<body>

<div id="scoreUI">Score: <span id="score">0</span></div>
<div id="timerUI">Time: <span id="timer">0</span>s</div>

<canvas id="game" width="900" height="350"></canvas>

<div id="gameOver">
    <h1>Game Over</h1>
    <p>Score: <span id="finalScore"></span></p>
    <button onclick="restart()">Play Again</button>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

/* palette */
const palette = {
    sky1: "#1E2136",
    sky2: "#32769B",
    ground: "#62866C",
    star: "#FFF689",
    obstacleLow: "#F67B45",
    obstacleHigh: "#8BA47C",
    glow: "#F4D35E"
};

let player, obstacles, score, frame, gameOver;
let speed = 6;

/* timer system */
let startTime = Date.now();
let elapsedSeconds = 0;

/* ---------- INIT ---------- */
function init() {
    player = {
        x: 120,
        y: 260,
        w: 28,
        h: 28,
        vy: 0,
        jumping: false,
        ducking: false
    };

    obstacles = [];
    score = 0;
    frame = 0;
    gameOver = false;

    speed = 6;
    startTime = Date.now();

    document.getElementById("score").innerText = 0;
    document.getElementById("timer").innerText = 0;
    document.getElementById("gameOver").style.display = "none";

    loop();
}

/* ---------- TIMER + SPEED SCALE ---------- */
function updateTimerAndSpeed() {
    elapsedSeconds = Math.floor((Date.now() - startTime) / 1000);
    document.getElementById("timer").innerText = elapsedSeconds;

    // 🔥 speed increases every 10 seconds
    speed = 6 + Math.floor(elapsedSeconds / 10) * 1.5;
}

/* ---------- OBSTACLES ---------- */
function spawnObstacle() {
    let type = Math.random() < 0.5 ? "low" : "high";

    if (type === "low") {
        obstacles.push({
            x: 900,
            y: 235,
            w: 40,
            h: 40,
            type: "low",
            passed: false
        });
    } else {
        obstacles.push({
            x: 900,
            y: 200,
            w: 40,
            h: 40,
            type: "high",
            passed: false
        });
    }
}

/* ---------- STAR ---------- */
function drawStar(x, y, size) {
    ctx.fillStyle = palette.star;
    ctx.shadowColor = palette.glow;
    ctx.shadowBlur = 15;

    ctx.beginPath();
    for (let i = 0; i < 5; i++) {
        ctx.lineTo(
            x + size * Math.cos((18 + i * 72) * Math.PI / 180),
            y + size * Math.sin((18 + i * 72) * Math.PI / 180)
        );
        ctx.lineTo(
            x + (size/2) * Math.cos((54 + i * 72) * Math.PI / 180),
            y + (size/2) * Math.sin((54 + i * 72) * Math.PI / 180)
        );
    }
    ctx.closePath();
    ctx.fill();
    ctx.shadowBlur = 0;
}

/* ---------- BACKGROUND ---------- */
function drawBackground() {
    let grad = ctx.createLinearGradient(0,0,0,350);
    grad.addColorStop(0, palette.sky2);
    grad.addColorStop(1, palette.sky1);

    ctx.fillStyle = grad;
    ctx.fillRect(0,0,900,350);
}

/* ---------- PLAYER ---------- */
function updatePlayer() {
    if (player.ducking) {
        player.h = 18;
        player.y = 270;
    } else {
        player.h = 28;
    }

    player.vy += 0.7;
    player.y += player.vy;

    if (player.y > 260) {
        player.y = 260;
        player.vy = 0;
        player.jumping = false;
    }
}

/* ---------- OBSTACLES ---------- */
function updateObstacles() {
    for (let o of obstacles) {
        o.x -= speed;

        if (!o.passed && o.x + o.w < player.x) {
            score++;
            document.getElementById("score").innerText = score;
            o.passed = true;
        }

        let requiresJump = o.type === "low";
        let requiresDuck = o.type === "high";

        let correct =
            (requiresJump && player.jumping) ||
            (requiresDuck && player.ducking);

        let hit =
            player.x < o.x + o.w &&
            player.x + player.w > o.x &&
            player.y < o.y + o.h &&
            player.y + player.h > o.y;

        if (hit && !correct) {
            endGame();
        }
    }

    obstacles = obstacles.filter(o => o.x > -50);
}

/* ---------- DRAW ---------- */
function drawGround() {
    ctx.fillStyle = palette.ground;
    ctx.fillRect(0, 300, 900, 50);
}

function drawObstacles() {
    for (let o of obstacles) {
        ctx.fillStyle = o.type === "low"
            ? palette.obstacleLow
            : palette.obstacleHigh;

        ctx.shadowColor = palette.glow;
        ctx.shadowBlur = 12;
        ctx.fillRect(o.x, o.y, o.w, o.h);
        ctx.shadowBlur = 0;
    }
}

/* ---------- LOOP ---------- */
function loop() {
    if (gameOver) return;

    drawBackground();

    updateTimerAndSpeed();
    updatePlayer();
    updateObstacles();

    drawGround();
    drawObstacles();
    drawStar(player.x, player.y, player.h);

    frame++;
    if (frame % Math.max(40, 80 - elapsedSeconds * 2) === 0) {
        spawnObstacle();
    }

    requestAnimationFrame(loop);
}

/* ---------- GAME OVER ---------- */
function endGame() {
    gameOver = true;
    document.getElementById("finalScore").innerText = score;
    document.getElementById("gameOver").style.display = "block";
}

function restart() {
    init();
}

/* ---------- CONTROLS ---------- */
window.addEventListener("keydown", (e) => {
    if (e.code === "ArrowUp" && !player.jumping) {
        player.vy = -13;
        player.jumping = true;
    }

    if (e.code === "ArrowDown") {
        player.ducking = true;
    }
});

window.addEventListener("keyup", (e) => {
    if (e.code === "ArrowDown") {
        player.ducking = false;
    }
});

init();
</script>

</body>
</html>
